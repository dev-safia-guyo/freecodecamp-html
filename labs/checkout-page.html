<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Checkout Page</title>
</head>

<body>
<h1>Checkout</h1>
<section>
    <h2>Your Cart</h2>
    <img src="https://cdn.freecodecamp.org/curriculum/labs/cube.jpg" alt="cube of different colors layer on each other">
</section>
<section>
    <h2>Payment Information</h2>
    <form>
        <label for="card-name"><span aria-hidden="true">*</span>Card Name</label>
        <input id="card-name" name="card-name"
        type="text"
        required>
        <label for="card-number"><span aria-hidden="true">*</span>Card Number</label>
        <input id ="card-number" name="card-number" aria-describedby="card-number-help" type="text" required>
        <p id="card-number-help">Card Number Help</p>
    </form>
</section>
</body>

</html>
